name: Security

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  betterleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        run: |
          BETTERLEAKS_VERSION="1.6.1"
          BETTERLEAKS_SHA256="fbefc700a0bd4522cc952dd2a8f259cdb80526d7e60114aca19bb2d6fdc80f81"
          BETTERLEAKS_ARCHIVE="betterleaks_${BETTERLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o betterleaks.tar.gz \
            "https://github.com/betterleaks/betterleaks/releases/download/v${BETTERLEAKS_VERSION}/${BETTERLEAKS_ARCHIVE}"
          echo "${BETTERLEAKS_SHA256}  betterleaks.tar.gz" | sha256sum -c -
          tar -xzf betterleaks.tar.gz betterleaks
          chmod +x betterleaks
          ./betterleaks version

      - name: Run Betterleaks
        run: |
          ./betterleaks git . \
            --config .gitleaks.toml \
            --verbose \
            --report-format json \
            --report-path betterleaks-report.json

      - name: Upload Betterleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betterleaks-report
          path: betterleaks-report.json

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run dependency audit
        run: npm audit --audit-level=high
